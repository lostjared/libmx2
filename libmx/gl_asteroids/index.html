<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MasterPiece - [GLES3 Edition]</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }
    
    canvas {
      display: block;
      background-color: #000;
      image-rendering: pixelated; 
    }

    #gamepad-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 1000;
    }
    
    #gamepad-overlay.visible {
      display: grid;
      align-items: center;
    }

    .gp-panel {
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    .dpad {
      position: relative;
      width: 140px;
      height: 140px;
    }
    
    .dpad-btn {
      position: absolute;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      font-family: monospace;
      width: 46px;
      height: 46px;
    }
    
    .dpad-btn:active, .dpad-btn.pressed {
      background: rgba(255,255,255,0.4);
    }
    
    .up    { top: 0; left: 47px; }
    .down  { bottom: 0; left: 47px; }
    .left  { top: 47px; left: 0; }
    .right { top: 47px; right: 0; }

    .action-btn-container {
      margin-top: 20px;
    }
    
    .btn-space {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(220, 20, 60, 0.8);
      border: 4px solid rgba(255, 255, 255, 0.4);
      color: white;
      font-weight: bold;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    
    .btn-space:active, .btn-space.pressed {
      background: rgba(255, 0, 0, 1);
      transform: scale(0.92);
    }

    .gp-spacer {
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="gamepad-overlay">
    <div class="gp-panel" id="gp-left">
      <div class="dpad">
        <div class="dpad-btn up"    data-key="w">W</div>
        <div class="dpad-btn down"  data-key="s">S</div>
        <div class="dpad-btn left"  data-key="a">A</div>
        <div class="dpad-btn right" data-key="d">D</div>
      </div>
    </div>
    
    <div class="gp-spacer"></div>
    
    <div class="gp-panel" id="gp-right">
      <div class="dpad">
        <div class="dpad-btn up"    data-key="ArrowUp">&#9650;</div>
        <div class="dpad-btn down"  data-key="ArrowDown">&#9660;</div>
        <div class="dpad-btn left"  data-key="ArrowLeft">&#9664;</div>
        <div class="dpad-btn right" data-key="ArrowRight">&#9654;</div>
      </div>
      <div class="action-btn-container">
        <div class="btn-space" data-key=" ">SPACE</div>
      </div>
    </div>
  </div>

  <script>
    var baseWidth = 1440;
    var baseHeight = 1080;
    var mobileRegex = /Mobi|Android|iPhone|iPad|iPod/i;
    var controlReservePerSide = 160;

    var Module = {
      canvas: (function(){
        var canvas = document.getElementById('canvas');
        canvas.width = baseWidth;
        canvas.height = baseHeight;
        return canvas;
      })(),
      onRuntimeInitialized: function() {
        resizeCanvas();
      }
    };

    function resizeCanvas() {
      var canvas = Module.canvas;
      var overlay = document.getElementById('gamepad-overlay');
      var aspect = 4 / 3;
      var windowWidth = window.innerWidth;
      var windowHeight = window.innerHeight;
      var isMobile = mobileRegex.test(navigator.userAgent);
      var isLandscape = windowWidth > windowHeight;
      var showControls = isMobile && isLandscape;
      var maxCanvasWidth = windowWidth;

      if (showControls) {
        maxCanvasWidth = Math.max(0, windowWidth - (controlReservePerSide * 2));
      }

      var availWidth = maxCanvasWidth;
      var availHeight = windowHeight;
      var w, h;

      if (availWidth / availHeight > aspect) {
        h = availHeight;
        w = h * aspect;
      } else {
        w = availWidth;
        h = w / aspect;
      }

      canvas.style.width = Math.floor(w) + 'px';
      canvas.style.height = Math.floor(h) + 'px';

      if (showControls) {
        var sideWidth = Math.max(0, Math.floor((windowWidth - w) / 2));
        overlay.style.gridTemplateColumns = sideWidth + 'px ' + Math.floor(w) + 'px ' + sideWidth + 'px';
      } else {
        overlay.style.gridTemplateColumns = '';
      }
    }

    window.addEventListener('resize', resizeCanvas);

    (function() {
      var overlay = document.getElementById('gamepad-overlay');

      function checkLandscape() {
        if (mobileRegex.test(navigator.userAgent) && window.innerWidth > window.innerHeight) {
          overlay.classList.add('visible');
        } else {
          overlay.classList.remove('visible');
        }
        resizeCanvas();
      }

      window.addEventListener('resize', checkLandscape);
      window.addEventListener('orientationchange', function() {
        setTimeout(checkLandscape, 150);
      });
      checkLandscape();

      var keyCodeMap = {
        'w': 87, 'a': 65, 's': 83, 'd': 68,
        'ArrowUp': 38, 'ArrowDown': 40, 'ArrowLeft': 37, 'ArrowRight': 39,
        ' ': 32
      };

      function fireKey(type, key) {
        var code = keyCodeMap[key] || 0;
        var eventCode = key;
        
        if (key === ' ') eventCode = 'Space';
        if (key.length === 1 && key !== ' ') eventCode = 'Key' + key.toUpperCase();

        var evt = new KeyboardEvent(type, {
          key: key,
          code: eventCode,
          keyCode: code,
          which: code,
          bubbles: true,
          cancelable: true
        });
        window.dispatchEvent(evt);
      }

      var buttons = overlay.querySelectorAll('[data-key]');
      for (var i = 0; i < buttons.length; i++) {
        (function(btn) {
          var key = btn.getAttribute('data-key');

          btn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            btn.classList.add('pressed');
            fireKey('keydown', key);
          }, { passive: false });

          btn.addEventListener('touchend', function(e) {
            e.preventDefault();
            btn.classList.remove('pressed');
            fireKey('keyup', key);
          }, { passive: false });

          btn.addEventListener('touchcancel', function(e) {
            btn.classList.remove('pressed');
            fireKey('keyup', key);
          });
        })(buttons[i]);
      }
    })();
  </script>
  
  <script src="Asteroids.js?v=2.0xx1"></script>
</body>
</html>
